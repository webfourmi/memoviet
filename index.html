<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#8fb7a0"><meta name="description" content="MemoViet, application PWA pour apprendre le vietnamien pratique."><title>MemoViet</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icons/icon.svg" type="image/svg+xml"><style>html,body{height:100%;margin:0}body{display:grid;place-items:center;background:linear-gradient(160deg,#fffaf3,#e7f1ea);font-family:system-ui,sans-serif;color:#284438}.load{text-align:center;padding:28px}.lotus{font-size:72px;animation:p 1.4s ease-in-out infinite}@keyframes p{50%{transform:scale(1.08)}}small{display:block;margin-top:12px;color:#63776c}</style></head><body><main class="load"><div class="lotus">🪷</div><h1>MemoViet</h1><p>Préparation de l’application…</p><small id="s">Chargement hors ligne compatible</small></main><script>
(async()=>{try{const files=["payload/00.txt", "payload/01.txt", "payload/02.txt", "payload/03.txt", "payload/04.txt", "payload/05.txt", "payload/06.txt", "payload/07.txt", "payload/08.txt", "payload/09.txt", "payload/10.txt", "payload/11.txt", "payload/12.txt", "payload/13.txt"];const texts=await Promise.all(files.map(async f=>{const r=await fetch(f);if(!r.ok)throw new Error(f);return r.text()}));const bin=atob(texts.join(''));const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));if(!('DecompressionStream'in window))throw new Error('Navigateur trop ancien');const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(e){document.getElementById('s').textContent='Impossible de charger MemoViet : '+e.message}})();
</script></body></html>
