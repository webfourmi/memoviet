name: Publier MemoViet

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Préparer le site
        run: |
          rm -rf _site
          mkdir _site
          cp -a index.html manifest.webmanifest sw.js editor.js editor.css icons assets _site/
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          if 'editor.css' not in text:
              text = text.replace('</head>', '<link rel="stylesheet" href="editor.css?v=1"></head>')
          if 'editor.js' not in text:
              text = text.replace('</body>', '<script src="editor.js?v=1"></script></body>')
          p.write_text(text, encoding='utf-8')

          sw = Path('_site/sw.js')
          sw_text = sw.read_text(encoding='utf-8')
          sw_text = sw_text.replace("memoviet-context-scenes-v7", "memoviet-editor-v8")
          if 'editor.js' not in sw_text:
              sw_text = sw_text.replace('"./manifest.webmanifest"', '"./manifest.webmanifest","./editor.js","./editor.css"')
          sw.write_text(sw_text, encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
