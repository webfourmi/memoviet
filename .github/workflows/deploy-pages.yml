name: Déployer MemoViet dans la branche principale

on:
  push:
    branches: [main]
    paths:
      - 'memoviet-package.zip'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: memoviet-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier le paquet
        run: test -f memoviet-package.zip

      - name: Décompresser MemoViet
        run: |
          rm -rf _site
          mkdir _site
          unzip -q memoviet-package.zip -d _site

          rm -rf assets icons payload
          rm -f index.html manifest.webmanifest sw.js .nojekyll

          cp -a _site/. .
          touch .nojekyll
          rm -rf _site

      - name: Publier les fichiers dans main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.webmanifest sw.js icons assets .nojekyll
          if git diff --cached --quiet; then
            echo "MemoViet est déjà à jour."
          else
            git commit -m "Déployer MemoViet"
            git push
          fi
