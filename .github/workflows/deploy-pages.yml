name: Publier MemoViet

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Préparer le site
        run: |
          rm -rf _site
          mkdir _site
          cp -a index.html manifest.webmanifest sw.js editor.js editor.css backup.js backup.css ux.js ux.css icons assets _site/
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          links = [
              ('editor.css', '<link rel="stylesheet" href="editor.css?v=2">'),
              ('backup.css', '<link rel="stylesheet" href="backup.css?v=1">'),
              ('ux.css', '<link rel="stylesheet" href="ux.css?v=2">')
          ]
          for marker, tag in links:
              if marker not in text:
                  text = text.replace('</head>', tag + '</head>')
          scripts = [
              ('editor.js', '<script src="editor.js?v=2"></script>'),
              ('backup.js', '<script src="backup.js?v=1"></script>'),
              ('ux.js', '<script src="ux.js?v=2"></script>')
          ]
          for marker, tag in scripts:
              if marker not in text:
                  text = text.replace('</body>', tag + '</body>')
          p.write_text(text, encoding='utf-8')

          sw = Path('_site/sw.js')
          sw_text = sw.read_text(encoding='utf-8')
          for old in ['memoviet-compact-v10','memoviet-backup-v9','memoviet-editor-v8','memoviet-context-scenes-v7']:
              sw_text = sw_text.replace(old, 'memoviet-compact-v11')
          additions = '"./editor.js","./editor.css","./backup.js","./backup.css","./ux.js","./ux.css"'
          if 'ux.js' not in sw_text:
              sw_text = sw_text.replace('"./manifest.webmanifest"', '"./manifest.webmanifest",' + additions)
          sw.write_text(sw_text, encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4