name: Publier MemoViet

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Préparer le site
        run: |
          rm -rf _site
          mkdir _site
          cp -a index.html manifest.webmanifest sw.js dialogue-av02.js editor.js editor.css editor-mobile.js editor-mobile.css backup.js backup.css ux.js ux.css lesson-fixes.js lesson-fixes.css adventure-flow.js adventure-flow.css review-scope.js review-scope.css progress-map.js progress-map.css progress-map-visible.js progress-map-watercolor.js progress-map-watercolor.css mobile-shell.js mobile-shell.css mobile-cleanup.js mobile-cleanup.css icons assets _site/
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          links = [
              ('editor.css', '<link rel="stylesheet" href="editor.css?v=31">'),
              ('editor-mobile.css', '<link rel="stylesheet" href="editor-mobile.css?v=31">'),
              ('backup.css', '<link rel="stylesheet" href="backup.css?v=31">'),
              ('ux.css', '<link rel="stylesheet" href="ux.css?v=31">'),
              ('lesson-fixes.css', '<link rel="stylesheet" href="lesson-fixes.css?v=31">'),
              ('adventure-flow.css', '<link rel="stylesheet" href="adventure-flow.css?v=31">'),
              ('review-scope.css', '<link rel="stylesheet" href="review-scope.css?v=31">'),
              ('progress-map.css', '<link rel="stylesheet" href="progress-map.css?v=31">'),
              ('progress-map-watercolor.css', '<link rel="stylesheet" href="progress-map-watercolor.css?v=31">'),
              ('mobile-shell.css', '<link rel="stylesheet" href="mobile-shell.css?v=31">'),
              ('mobile-cleanup.css', '<link rel="stylesheet" href="mobile-cleanup.css?v=31">')
          ]
          for marker, tag in links:
              if marker not in text:
                  text = text.replace('</head>', tag + '</head>')
          scripts = [
              ('dialogue-av02.js', '<script src="dialogue-av02.js?v=31"></script>'),
              ('editor.js', '<script src="editor.js?v=31"></script>'),
              ('editor-mobile.js', '<script src="editor-mobile.js?v=31"></script>'),
              ('backup.js', '<script src="backup.js?v=31"></script>'),
              ('ux.js', '<script src="ux.js?v=31"></script>'),
              ('lesson-fixes.js', '<script src="lesson-fixes.js?v=31"></script>'),
              ('adventure-flow.js', '<script src="adventure-flow.js?v=31"></script>'),
              ('review-scope.js', '<script src="review-scope.js?v=31"></script>'),
              ('progress-map.js', '<script src="progress-map.js?v=31"></script>'),
              ('progress-map-visible.js', '<script src="progress-map-visible.js?v=31"></script>'),
              ('progress-map-watercolor.js', '<script src="progress-map-watercolor.js?v=31"></script>'),
              ('mobile-shell.js', '<script src="mobile-shell.js?v=31"></script>'),
              ('mobile-cleanup.js', '<script src="mobile-cleanup.js?v=31"></script>')
          ]
          for marker, tag in scripts:
              if marker not in text:
                  text = text.replace('</body>', tag + '</body>')
          p.write_text(text, encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
